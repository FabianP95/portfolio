<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Portfolio</title>
    <link rel="icon" href="./assets/icons/logo/logoDarkBlue.svg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./styles/hero_section.css">
    <link rel="stylesheet" href="./styles/standard.css">
</head>

<body>
    <div class="wrapper-hero-section">
        <section class="hero">
            <div class="swap-image">
                <img src="./assets/icons/hero_section/heroBackground.svg" alt="background of the main image"
                    class="image-default">
                <img src="./assets/icons/hero_section/heroBackgroundHover.svg"
                    alt="background of the main image in hover state" class="image-hover">
                <img src="./assets/icons/skills/apiBig.svg" alt="photo of fabian puchta">
            </div>
            <div class="info-hero-section">
                <div class="head-container">
                    <div class="wrapper-logo-header">
                        <div class="swap-image">
                            <img src="./assets/icons/logo/logoLightBlue.svg" alt="logo" class="image-default">
                            <img src="./assets/icons/logo/logoHover.svg" alt="logo hover state" class="image-hover">
                        </div>
                        <div>
                            <p class="name">F. Puchta</p>
                            <p>developer</p>
                        </div>
                    </div>
                    <div class="wrapper-social-media">
                        <a href="" target="_blank" rel="noopener noreferrer" class="swap-image">
                            <img src="./assets/icons/social_media/emailBlue.svg" alt="email icon" class="image-default">
                            <img src="./assets/icons/social_media/mailMediaHover.svg" class="image-hover"
                                alt="email icon in hovered state">
                        </a>
                        <a href="" target="_blank" rel="noopener noreferrer" class="swap-image">
                            <img src="./assets/icons/social_media/linkedIn.svg" alt="linkedIn icon"
                                class="image-default">
                            <img src="./assets/icons/social_media/linkedInHover.svg" class="image-hover"
                                alt="linkedIn icon in hovered state">
                        </a>
                        <a href="https://github.com/FabianP95" target="_blank" rel="noopener noreferrer"
                            class="swap-image">
                            <img src="./assets/icons/social_media/github.svg" alt="gitHub icon" class="image-default">
                            <img src="./assets/icons/social_media/githubHover.svg" class="image-hover"
                                alt="gitHub icon in hovered state">
                        </a>
                    </div>
                </div>
                <div class="title">
                    <h1>Fabian Puchta</h1>
                    <p>Frontend Developer</p>
                </div>
                <div class="wrapper-arrow-down">
                    <a href="" class="swap-image">
                        <img src="./assets/icons/hero_section/arrowDownHover.svg" class="image-hover"
                            alt="arrow pointing downward in hovered state">
                        <img src="./assets/icons/hero_section/arrowDown.svg" class="image-default"
                            alt="arrow pointing downward">
                    </a>
                </div>
            </div>
        </section>
    </div>
    <div class="wrapper-navbar">
        <nav>
            <div class="navbar-logo">
                <div class="wrapper-logo">
                    <img src="./assets/icons/logo/logoDarkBlue.svg" alt="logo">
                    <p class="name">F. Puchta</p>
                    <p>developer</p>
                </div>
            </div>
            <div class="navbar-menu">
                <a href="">Why Me</a>
                <a href="">Skills</a>
                <a href="">Projects</a>
                <a href="">Contact</a>
            </div>
            <div class="navbar-language">
                <a class="swap-image"> DE
                    <img class="image-hover pos-hover" src="./assets/icons/languages/deHover.svg"
                        alt="set content to german in hover state">
                </a>
                <a class="swap-image"> EN
                    <img class="image-hover pos-hover" src="./assets/icons/languages/enHover.svg"
                        alt="set content to english in hover state"></a>
            </div>
        </nav>
    </div>
    <div style="height:400px"></div>

    <footer>

    </footer>

</body>
<script src="/script.js"></script>

</html>
